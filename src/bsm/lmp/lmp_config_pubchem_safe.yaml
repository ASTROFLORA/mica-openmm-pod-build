# LMP v2.0 Configuration (PubChem SAFE RUN)
# ==================================================
# Copy of base config with PubChem enabled and conservative throttling.

version: "2.0.0"
schema_version: "2.0"

# ---------------------------------------------------------------------------
# CONTROLLED VOCABULARIES
# ---------------------------------------------------------------------------

vocabularies:
  ptm_types:
    - phosphorylation
    - acetylation
    - ubiquitination
    - methylation
    - sumoylation
    - glycosylation
    - hydroxylation
    - nitrosylation
    - other

  ptm_status:
    - present
    - absent
    - transient
    - unknown

  ligand_types:
    - agonist
    - antagonist
    - substrate
    - inhibitor
    - cofactor
    - allosteric_modulator

  ligand_effects:
    - activation
    - inhibition
    - catalysis
    - allosteric_modulation
    - stabilization

  interface_types:
    - heterodimer
    - homodimer
    - intramolecular
    - protein-protein
    - protein-ligand

  confidence_levels:
    - high
    - medium
    - low
    - predicted

  source_types:
    - UniProt
    - PDB
    - PhosphoSitePlus
    - M-CSA
    - manual_curation
    - computational_prediction

# ---------------------------------------------------------------------------
# STATE NAME MAPPINGS
# ---------------------------------------------------------------------------

state_mappings:
  active: ACTIVE
  inactive: INACTIVE
  autoinhibited: INACTIVE
  inhibitor-bound: INACTIVE
  substrate-bound: ACTIVE
  transition_state: TRANSITION
  phosphorylated: ACTIVE
  agonist-bound: ACTIVE
  antagonist-bound: INACTIVE
  open: ACTIVE
  closed: INACTIVE
  allosteric: ALLOSTERIC
  apo: INACTIVE
  unknown: UNKNOWN

# ---------------------------------------------------------------------------
# PTM-RESIDUE COMPATIBILITY
# ---------------------------------------------------------------------------

ptm_residue_compatibility:
  phosphorylation: [S, T, Y]
  acetylation: [K]
  ubiquitination: [K]
  methylation: [K, R]
  sumoylation: [K]
  glycosylation: [N, S, T]
  hydroxylation: [P, K]
  nitrosylation: [C]

# ---------------------------------------------------------------------------
# CONFIDENCE SCORE MAPPINGS
# ---------------------------------------------------------------------------

confidence_scores:
  high: 0.9
  medium: 0.7
  low: 0.5
  predicted: 0.3

# ---------------------------------------------------------------------------
# PARSER SETTINGS
# ---------------------------------------------------------------------------

parser:
  validate_schema: true
  xsd_path: "lmp_v2_schema.xsd"
  strict_mode: false
  skip_invalid: false
  support_multi_chain: true
  default_chain_id: "A"
  support_nested_domains: true
  max_domain_depth: 3
  log_level: "INFO"
  log_file: "lmp_parser.log"
  log_format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# ---------------------------------------------------------------------------
# GENERATOR SETTINGS
# ---------------------------------------------------------------------------

generator:
  uniprot_api: "https://rest.uniprot.org/uniprotkb"
  pdb_api: "https://data.rcsb.org/rest/v1/core/entry"
  phosphosite_api: null

  # PubChem enrichment (SAFE)
  pubchem:
    enabled: true
    api_base: "https://pubchem.ncbi.nlm.nih.gov/rest/pug"
    timeout_seconds: 15
    # Conservative rate limit (seconds between PubChem calls)
    rate_limit: 1.5
    # Honor PubChem's dynamic throttling feedback (X-Throttling-Control)
    dynamic_throttling: true
    # Best-effort retries on 429/503/504
    max_retries: 3
    backoff_base_seconds: 2.0
    jitter_seconds: 0.5
    # Cap enrichment work per PDB to avoid huge call volume
    max_ligands_per_pdb: 3
    include_synonyms: false
    property_fields:
      - CanonicalSMILES
      - IsomericSMILES
      - InChI
      - InChIKey
      - MolecularFormula
      - MolecularWeight
      - IUPACName
    write_sidecar_json: true
    sidecar_prefix: "pubchem_enrichment"
    xml_include_pubchem_cid: false

  # General rate limiting for external APIs
  rate_limit: 1.0

  cache_enabled: true
  cache_dir: "lmp_cache"
  cache_ttl: 86400

  mcsa_default_states:
    - Apo_Inactive
    - Substrate_bound_Active

  infer_states_from_ptms: true
  infer_states_from_pdb: true

# ---------------------------------------------------------------------------
# VALIDATOR SETTINGS
# ---------------------------------------------------------------------------

validator:
  validate_schema: true
  validate_vocabularies: true
  validate_causality: true
  validate_biology: true
  strict_mode: false
  fail_on_warning: false
  check_residue_ptm_compatibility: true
  check_sequence_position_bounds: true
  check_binding_site_positions: true

# ---------------------------------------------------------------------------
# STATE ANNOTATOR SETTINGS
# ---------------------------------------------------------------------------

annotator:
  mcsa_csv_columns:
    - uniprot_id
    - gene_name
    - catalytic_residues
    - mechanism_type
  output_format: "xml"
  naming_convention: "{uniprot_id}_{state_name}.xml"
  link_ese_signatures: true
  ese_signature_format: "ese_{uniprot_id}_{state_name}_{trajectory_id}"
  validate_after_generation: true
  skip_invalid_after_generation: false
